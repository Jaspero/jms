<form class="mw-30 m-l-auto m-r-auto p-a-1">
  <mat-card>
    <mat-card-header>
      <mat-card-title><b>{{staticConfig.displayName}} {{'RESET_PASSWORD.PASSWORD_RESET' | transloco}}</b></mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <mat-form-field class="w-100" appearance="outline">
        <mat-label>{{'GENERAL.EMAIL' | transloco}}</mat-label>
        <input
          [formControl]="resetControl"
          type="email"
          matInput
        />
        <mat-error *ngIf="resetControl.dirty">{{'RESET_PASSWORD.EMAIL_DOESNT_EXIST' | transloco}}</mat-error>
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions class="ta-right">
      <a mat-button routerLink="/login">
        {{'RESET_PASSWORD.GO_BACK' | transloco}}
      </a>
      <button
        type="submit"
        mat-flat-button
        color="primary"
        [disabled]="resetControl.invalid"
        (click)="reset()">
        {{'RESET_PASSWORD.RESET_MY_PASSWORD' | transloco}}
      </button>
    </mat-card-actions>
  </mat-card>
</form>
