<h1 mat-dialog-title>Filters</h1>

<mat-dialog-content>
  <fb-form-builder #cForm [data]="data"></fb-form-builder>
</mat-dialog-content>

<mat-dialog-actions class="jc-end">
  <ng-container *ngIf="data.clearFilters">
    <button type="button" mat-button (click)="apply(cForm.form, cForm.parser, data.clearFilters)">
      {{data.clearFiltersLabel || 'Clear'}}
    </button>
  </ng-container>
  <div class="fg-1"></div>
  <button mat-button mat-dialog-close>{{'GENERAL.CANCEL' | transloco}}</button>
  <button type="submit" mat-flat-button color="primary" (click)="apply(cForm.form, cForm.parser)">
    {{'INSTANCE_OVERVIEW.APPLY' | transloco}}
  </button>
</mat-dialog-actions>
